# https://doc.rust-lang.org/cargo/reference/manifest.html

[package]
name = "axiston-runtime"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
publish = { workspace = true }
readme = "./README.md"

authors = { workspace = true }
repository = { workspace = true }
homepage = { workspace = true }
documentation = { workspace = true }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lib]
path = "lib.rs"

[dependencies]
# tokio = { version = "1.39", features = [] }
thiserror = { version = "1.0", features = [] }
tracing = { version = "0.1", features = [] }
deadpool = { version = "0.12", features = ["managed"] }

tonic = { version = "0.12", features = [] }
prost = { version = "0.13", features = [] }
tonic-types = { version = "0.12", features = [] }
prost-types = { version = "0.13", features = [] }

tower = { version = "0.4", features = ["full"] }
tower-http = { version = "0.5", features = ["full"] }

[build-dependencies]
anyhow = { version = "1.0", features = ["backtrace"] }
tonic-build = { version = "0.12", features = [] }
prost-build = { version = "0.13", features = [] }
